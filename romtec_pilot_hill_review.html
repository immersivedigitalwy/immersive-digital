<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romtec Pilot Hill | Immersive Digital Co</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0A0A0A; 
            color: #FFFFFF; 
            margin: 0;
            padding: 60px 20px;
            text-align: center;
        }
        .container {
            max-width: 1200px; 
            margin: 0 auto;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 5px;
            font-weight: 700; 
            color: #FFFFFF;
        }
        p.subtitle {
            font-size: 1.3rem;
            color: #888888; 
            margin-bottom: 60px;
            font-weight: 400; 
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }
        .image-wrapper {
            position: relative; 
            display: inline-block;
            overflow: hidden;
            border-radius: 8px; 
            background-color: #282828; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .image-wrapper:hover {
            transform: translateY(-5px);
        }
        .gallery img {
            width: 100%;
            height: auto;
            display: block; 
            transition: opacity 0.3s ease;
        }
        .image-wrapper:hover img {
            opacity: 0.3;
        }
        .css-watermark {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem; 
            font-weight: 700;
            color: #FFFFFF; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            pointer-events: none; 
            user-select: none; 
            z-index: 10; 
            transition: opacity 0.3s ease;
            opacity: 1; 
        }
        .image-wrapper:hover .css-watermark {
            opacity: 0.1; 
        }
        .brand-dot {
            color: #C6F84E;
        }
        .payment-box {
            background-color: #282828; 
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            max-width: 600px;
            margin: 0 auto;
        }
        .payment-box h2 {
            font-weight: 700;
            font-size: 2rem;
            color: #FFFFFF;
            margin-bottom: 20px;
        }
        .payment-box p {
            color: #F5F5F5; 
            font-size: 1.2rem;
            line-height: 1.7;
            margin-bottom: 45px;
            font-weight: 400;
        }
        .pay-button {
            display: inline-block;
            background-color: #C6F84E; 
            color: #0A0A0A; 
            padding: 18px 45px;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 8px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .pay-button:hover {
            background-color: #b5e63d; 
            transform: translateY(-3px); 
        }
        .pay-button:active {
            transform: translateY(1px); 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Romtec Pilot Hill</h1>
    <p class="subtitle">Review your watermarked previews below. Pay the invoice to unlock high resolution deliverables.</p>

    <div class="gallery">
        <div class="image-wrapper">
            <img src="DJI_20260720145718_0002_D.JPG" alt="Romtec Pilot Hill Drone Shot 1">
            <span class="css-watermark">immersive<span class="brand-dot">.</span></span> 
        </div>

        <div class="image-wrapper">
            <img src="ROMTEC1.24.JPG" alt="Romtec Pilot Hill Drone Shot 2">
            <span class="css-watermark">immersive<span class="brand-dot">.</span></span>
        </div>

        <div class="image-wrapper">
            <img src="ROMTEC1.38.JPG" alt="Romtec Pilot Hill Drone Shot 3">
            <span class="css-watermark">immersive<span class="brand-dot">.</span></span>
        </div>
    </div>

    <div class="payment-box">
        <h2>Ready for the final files?</h2>
        <p>Complete your invoice securely via Stripe to instantly unlock your high resolution deliverables.</p>
        
        <a href="YOUR_STRIPE_PAYMENT_LINK" class="pay-button">Pay Invoice to Download</a>
    </div>
</div>

</body>
</html>
