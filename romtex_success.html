<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0A0A0A; 
            color: #FFFFFF; 
            margin: 0;
            padding: 100px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .success-box {
            background-color: #282828; 
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            max-width: 650px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            font-weight: 700;
            color: #FFFFFF;
        }
        p {
            color: #F5F5F5; 
            font-size: 1.2rem;
            line-height: 1.7;
            margin-bottom: 45px;
            font-weight: 400;
        }
        .download-button {
            display: inline-block;
            background-color: #C6F84E; 
            color: #0A0A0A; 
            padding: 20px 50px;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 700;
            border-radius: 8px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .download-button:hover {
            background-color: #b5e63d; 
            transform: translateY(-3px);
